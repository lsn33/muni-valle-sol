apiVersion: apps/v1
kind: Deployment
metadata:
  name: muni-frontend
  namespace: muni-valle-sol
  labels:
    app: muni-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: muni-frontend
  template:
    metadata:
      labels:
        app: muni-frontend
    spec:
      containers:
        - name: muni-frontend
          image: JOAKOO123/muni-valle-sol-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # NEXT_PUBLIC_BFF_URL NO se inyecta aquí porque Next.js la incrusta
          # en el bundle estático durante el build (tiempo de compilación).
          # Se pasa como --build-arg en el workflow de GitHub Actions.
          # NODE_ENV=production ya está seteado en el Dockerfile.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
