name: CI/CD - muni-valle-sol-frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # NEXT_PUBLIC_BFF_URL debe ir en build-time porque Next.js la incrusta
      # en el bundle estático durante el build — no es una variable de runtime.
      # Por eso se pasa como --build-arg aquí y NO en el Deployment de k8s.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/muni-valle-sol-frontend:latest
          build-args: |
            NEXT_PUBLIC_BFF_URL=${{ secrets.NEXT_PUBLIC_BFF_URL }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/muni-frontend -n muni-valle-sol
          kubectl rollout status deployment/muni-frontend -n muni-valle-sol --timeout=120s