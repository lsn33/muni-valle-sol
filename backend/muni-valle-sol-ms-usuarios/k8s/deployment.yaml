apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuarios
  namespace: muni-valle-sol
  labels:
    app: ms-usuarios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-usuarios
  template:
    metadata:
      labels:
        app: ms-usuarios
    spec:
      containers:
        - name: ms-usuarios
          image: lsn33/muni-valle-sol-ms-usuarios:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: muni-secrets
                  key: usuarios-db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: muni-secrets
                  key: usuarios-db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: muni-secrets
                  key: usuarios-db-password
            - name: JWT_PRIVATE_KEY_PATH
              value: "/secrets/private_key.pem"
            - name: JWT_PUBLIC_KEY_PATH
              value: "/secrets/public_key.pem"
            - name: JWT_ISSUER
              value: "http://ms-usuarios:8081"
            - name: SERVER_PORT
              value: "8081"
          volumeMounts:
            - name: jwt-keys
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: muni-jwt-keys
