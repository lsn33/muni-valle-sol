# ===================================================================
# CONFIGURACIÓN GENERAL DEL BFF
# ===================================================================
server.port=8080
spring.main.web-application-type=servlet

# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT RSA)
# ===================================================================
jwt.cookie.name=access_token
jwt.cookie.maxage=86400
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}

# -------------------------------------------------------------------
# NUEVO: Rutas para las llaves RSA (Firmado asimétrico)
# INDICA AQUÍ las variables o rutas locales para que tus compañeros 
# configuren sus llaves de desarrollo (Ej: classpath:certs/private.key)
# -------------------------------------------------------------------
jwt.rsa.private-key-path=${JWT_RSA_PRIVATE_KEY_PATH:classpath:certs/private.key}
jwt.rsa.public-key-path=${JWT_RSA_PUBLIC_KEY_PATH:classpath:certs/public.pub}

# ===================================================================
# VARIABLES DE ENTORNO (MICROSERVICIOS)
# ===================================================================
ms.usuarios.url=${MS_USUARIOS_URL:http://localhost:8081}
ms.reportes.url=${MS_REPORTES_URL:http://localhost:8082}
ms.alertas.url=${MS_ALERTAS_URL:http://localhost:8083}
ms.brigadas.url=${MS_BRIGADAS_URL:http://localhost:8084}

# ===================================================================
# CONFIGURACIÓN DE CORS
# ===================================================================
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# ===================================================================
# ACTUATOR (HEALTH CHECKS PARA KUBERNETES)
# ===================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ===================================================================
# SPRINGDOC OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.api-docs.location=classpath:/openapi.yaml
springdoc.swagger-ui.show-common-extensions=true
springdoc.swagger-ui.deep-linking=true
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.max-displayed-tags=10
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.csrf.enabled=false