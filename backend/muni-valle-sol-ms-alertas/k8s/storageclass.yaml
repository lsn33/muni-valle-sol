apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-fast
  labels:
    app: muni-valle-sol
provisioner: kubernetes.io/aws-ebs  # Cambiar según tu cloud (gce-pd, azure-disk, etc)
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
